name: Daily Prediction Pipeline

on:
  schedule:
    # 4時間ごと (6回/日) — 試合開始2-3時間前に最新ハンデで予測更新
    # JST 02:00 = UTC 17:00 (欧州サッカー/MLB結果確定)
    # JST 06:00 = UTC 21:00 (NBA夜の部)
    # JST 10:00 = UTC 01:00 (NBA昼/Bリーグ)
    # JST 14:00 = UTC 05:00 (NPB昼の試合)
    # JST 18:00 = UTC 09:00 (NPB夜/MLBデーゲーム)
    # JST 22:00 = UTC 13:00 (欧州サッカー/MLB夜)
    - cron: "0 17,21,1,5,9,13 * * *"
  workflow_dispatch:
    inputs:
      sport:
        description: "Sport to predict (blank = all)"
        required: false
        type: string
      dry_run:
        description: "Dry run (no Turso save)"
        required: false
        type: boolean
        default: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # SQLite DB を日次キャッシュ (特徴量計算に過去データが必要)
      - name: Restore DB cache
        uses: actions/cache/restore@v4
        with:
          path: data/sports_bet.db
          key: sports-bet-db-${{ github.run_id }}
          restore-keys: |
            sports-bet-db-

      # Turso CLI インストール
      - name: Setup Turso CLI
        run: |
          curl -sSfL https://get.tur.so/install.sh | bash
          echo "$HOME/.turso" >> $GITHUB_PATH

      - name: Verify Turso CLI
        run: turso --version

      # パイプライン実行 (TURSO_API_TOKEN 環境変数でCLI認証)
      - name: Run pipeline
        run: |
          ARGS="--days-back 7"
          if [ -n "${{ inputs.sport }}" ]; then
            ARGS="$ARGS --sport ${{ inputs.sport }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python daily_pipeline.py $ARGS
        env:
          HANDENOMORI_USER: ${{ secrets.HANDENOMORI_USER }}
          HANDENOMORI_PASS: ${{ secrets.HANDENOMORI_PASS }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}

      # 更新されたDBをキャッシュ保存 (次回実行で過去データとして利用)
      - name: Save DB cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/sports_bet.db
          key: sports-bet-db-${{ github.run_id }}
